<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5276">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ULAMA_E_DEOBAND</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #1a5276;
            --primary-light: #2980b9;
            --primary-dark: #154360;
            --accent: #e67e22;
            --accent-dark: #d35400;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #eef2f5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --nav-h: 64px;
            --mini-player-h: 64px;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text-main);
            min-height: 100vh;
            padding-bottom: calc(var(--nav-h) + var(--mini-player-h) + 8px);
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; padding: 16px 15px 14px; text-align: center;
            box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-size: 22px; letter-spacing: 1px; font-weight: 700; }
        header h5 { margin-top: 3px; font-size: 12px; opacity: 0.85; font-weight: 400; }
        .request-btn {
            position: absolute; top: 18px; left: 15px;
            background: var(--accent); color: white; border: none;
            padding: 8px 13px; border-radius: 20px; font-size: 12px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2); transition: all 0.2s;
        }
        .request-btn:hover { background: var(--accent-dark); transform: scale(1.04); }
        @media(max-width: 480px) {
            header { padding-top: 50px; }
            .request-btn { top: 10px; left: 50%; transform: translateX(-50%); }
            .request-btn:hover { transform: translateX(-50%) scale(1.04); }
        }

        /* LAYOUT */
        .container { padding: 18px; max-width: 640px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* SCHOLAR GRID */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .card {
            background: var(--card-bg); border-radius: var(--radius-lg);
            padding: 12px; text-align: center; cursor: pointer;
            box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s;
            position: relative; border: 1.5px solid var(--border);
        }
        .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .card:active { transform: translateY(-1px); }
        .card img { width: 100%; height: 155px; border-radius: 10px; object-fit: cover; }
        .card h3 { margin: 10px 0 4px; font-size: 15px; color: var(--text-main); font-weight: 700; line-height: 1.3; }
        .bayan-count-badge {
            position: absolute; top: 16px; left: 16px;
            background: rgba(26,82,118,0.88); color: white;
            padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: bold;
            direction: rtl; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
        }

        /* TRACK ITEMS */
        .track-item {
            background: var(--card-bg); margin-bottom: 16px;
            border-radius: var(--radius-md); cursor: pointer;
            box-shadow: var(--shadow-sm); overflow: hidden;
            border: 1.5px solid var(--border); transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .track-item:hover { transform: scale(1.01); box-shadow: var(--shadow-md); }
        .thumb-container { position: relative; width: 100%; height: 155px; overflow: hidden; }
        .track-item img { width: 100%; height: 155px; object-fit: cover; display: block; }
        .track-number-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.62); color: white;
            padding: 4px 10px; border-radius: 5px; font-size: 13px; font-weight: bold; z-index: 10;
        }
        .now-playing-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26,82,118,0.65); display: flex;
            justify-content: center; align-items: center; color: white;
            font-weight: bold; font-size: 17px; opacity: 0;
            transition: opacity 0.3s; backdrop-filter: blur(2px);
        }
        .track-item.active-track .now-playing-overlay { opacity: 1; }
        .track-item.active-track { border-color: var(--primary); box-shadow: 0 4px 18px rgba(26,82,118,0.22); }
        .track-details { padding: 13px 14px; text-align: right; direction: rtl; }
        .track-title { font-size: 14px; color: var(--primary); font-weight: 500; line-height: 1.45; margin-bottom: 6px; }
        .track-meta { display: flex; align-items: center; justify-content: space-between; }
        .track-duration { font-size: 12px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .track-actions { display: flex; gap: 6px; align-items: center; }
        .track-action-btn {
            background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px;
            padding: 5px 6px; border-radius: 6px; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .track-action-btn:hover { background: var(--border); color: var(--primary); }
        .track-action-btn.fav-btn.favorited { color: #e74c3c; }
        .track-action-btn.fav-btn:hover { color: #e74c3c; }

        /* LOADING */
        .loader-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 300px; width: 100%;
        }
        .spinner {
            border: 5px solid #e8ecf0; border-top: 5px solid var(--primary);
            border-radius: 50%; width: 48px; height: 48px;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { margin-top: 14px; color: var(--primary); font-weight: bold; font-size: 15px; }

        /* TAB TRANSITION OVERLAY */
        #tab-loader-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 500;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
        }
        #tab-loader-overlay.show { display: flex; }

        /* MINI PLAYER */
        #mini-player {
            position: fixed; bottom: var(--nav-h); left: 0; right: 0;
            height: var(--mini-player-h); background: var(--primary-dark);
            display: none; align-items: center; gap: 10px; padding: 0 14px;
            z-index: 900; box-shadow: 0 -3px 12px rgba(0,0,0,0.2); cursor: pointer;
        }
        #mini-player.visible { display: flex; }
        #mini-thumb {
            width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
            flex-shrink: 0; border: 2px solid rgba(255,255,255,0.2);
        }
        #mini-info { flex: 1; overflow: hidden; }
        #mini-title {
            color: white; font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            direction: rtl; text-align: right;
        }
        #mini-scholar { color: rgba(255,255,255,0.65); font-size: 11px; direction: rtl; text-align: right; }
        .mini-btn {
            background: rgba(255,255,255,0.12); border: none; color: white;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s;
        }
        .mini-btn:hover { background: rgba(255,255,255,0.22); }
        .mini-playing-bars { display: flex; align-items: flex-end; gap: 2px; height: 20px; flex-shrink: 0; }
        .mini-playing-bars span {
            display: block; width: 3px; border-radius: 2px; background: var(--accent);
            animation: sound-bars 0.9s ease-in-out infinite alternate;
        }
        .mini-playing-bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
        .mini-playing-bars span:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .mini-playing-bars span:nth-child(3) { height: 10px; animation-delay: 0.4s; }
        .mini-playing-bars span:nth-child(4) { height: 18px; animation-delay: 0.1s; }
        @keyframes sound-bars { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }
        #mini-player.paused .mini-playing-bars span { animation-play-state: paused; }

        /* FIX 2: Mini player buffering spinner */
        #mini-loading-spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.25);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            flex-shrink: 0;
        }
        #mini-player.buffering #mini-loading-spinner { display: block; }
        #mini-player.buffering .mini-playing-bars { display: none; }

        /* BOTTOM NAV */
        #bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
            background: white; border-top: 1.5px solid var(--border);
            display: flex; align-items: stretch; z-index: 1000;
            box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
        }
        .nav-tab {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; cursor: pointer; transition: all 0.2s; border: none; background: none; padding: 0;
            color: var(--text-muted); font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
        }
        .nav-tab i { font-size: 20px; transition: transform 0.2s, color 0.2s; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab.active i { transform: translateY(-2px); }
        .nav-tab:hover { color: var(--primary-light); }
        .nav-tab-label { font-size: 10px; }

        /* BACK BUTTON */
        .back-btn {
            background: var(--primary); color: white; border: none;
            padding: 9px 20px; border-radius: 7px; cursor: pointer;
            margin-bottom: 18px; font-weight: bold; transition: background 0.2s;
            display: inline-flex; align-items: center; gap: 5px; font-size: 14px;
        }
        .back-btn:hover { background: var(--primary-dark); }

        /* SCHOLAR HEADER */
        .scholar-header-card {
            text-align: center; margin-bottom: 22px; background: #2E2929;
            border-radius: var(--radius-lg); padding: 22px 16px;
            box-shadow: var(--shadow-sm); border: 1.5px solid var(--border);
        }
        .scholar-header-card img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--primary); object-fit: cover;
            box-shadow: 0 4px 14px rgba(26,82,118,0.2);
        }
        .scholar-header-card h2 { color: var(--text-main); margin-top: 12px; font-size: 20px; }

        /* FULL PLAYER MODAL */
        #full-player-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            z-index: 2000; justify-content: center; align-items: flex-end; backdrop-filter: blur(6px);
        }
        #full-player-modal.open { display: flex; }
        .full-player-sheet {
            background: var(--primary-dark); width: 100%; max-width: 640px;
            border-radius: 20px 20px 0 0; padding: 20px 20px 32px;
            animation: slideUp 0.3s ease; position: relative;
        }
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .full-player-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin: 0 auto 16px; }
        .full-player-thumb { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 14px; }
        .full-player-title { color: white; font-size: 15px; font-weight: 600; text-align: right; direction: rtl; margin-bottom: 4px; line-height: 1.4; }
        .full-player-scholar { color: rgba(255,255,255,0.65); font-size: 12px; text-align: right; direction: rtl; margin-bottom: 14px; }
        .full-player-controls { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 14px; }
        .fp-btn { background: rgba(255,255,255,0.12); border: none; color: white; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .fp-btn:hover { background: rgba(255,255,255,0.22); }
        .fp-play-btn { width: 64px; height: 64px; font-size: 26px; background: var(--accent); }
        .fp-play-btn:hover { background: var(--accent-dark); }
        .speed-row { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
        .speed-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .speed-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: bold; }
        .speed-label { color: rgba(255,255,255,0.5); font-size: 11px; }
        .progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; appearance: none; outline: none; }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
        .time-label { color: rgba(255,255,255,0.6); font-size: 11px; min-width: 36px; }
        .close-fp-btn { position: absolute; top: 3px; right: 16px; background: rgba(255,255,255,0.1); border: none; color: red; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal.open { display: flex; }
        .modal-content { background: white; padding: 24px; border-radius: var(--radius-md); width: 92%; max-width: 420px; text-align: right; direction: rtl; box-shadow: var(--shadow-lg); animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-title { color: var(--primary); font-size: 13px; font-weight: 700; border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 14px; line-height: 1.5; }
        .modal input, .modal textarea { width: 100%; padding: 10px 12px; margin-bottom: 13px; border: 1.5px solid #ddd; border-radius: 7px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .modal textarea { height: 100px; resize: none; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-start; }
        .btn-submit { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 7px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #bdc3c7; color: #333; border: none; padding: 10px 20px; border-radius: 7px; cursor: pointer; font-weight: bold; }

        /* FAVORITES & HISTORY */
        .fav-empty, .history-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .fav-empty i, .history-empty i { font-size: 48px; margin-bottom: 14px; display: block; opacity: 0.35; }
        .fav-empty p, .history-empty p { font-size: 14px; }

        .fav-item, .hist-item {
            background: white; border-radius: var(--radius-md);
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; margin-bottom: 12px;
            box-shadow: var(--shadow-sm); border: 1.5px solid var(--border);
            cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s;
            position: relative; overflow: hidden;
        }
        .fav-item:hover, .hist-item:hover { box-shadow: var(--shadow-md); }
        .fav-item.now-playing, .hist-item.now-playing {
            border-color: var(--primary);
            box-shadow: 0 4px 18px rgba(26,82,118,0.18);
            background: linear-gradient(135deg, #eaf2fb, #fdfefe);
        }
        .fav-item.now-playing::before, .hist-item.now-playing::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; background: var(--primary); border-radius: 4px 0 0 4px;
        }
        .fav-thumb-wrap, .hist-thumb-wrap { position: relative; flex-shrink: 0; }
        .fav-thumb, .hist-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; display: block; }
        .thumb-now-playing {
            position: absolute; inset: 0; border-radius: 8px;
            background: rgba(26,82,118,0.72);
            display: none; align-items: center; justify-content: center;
        }
        .fav-item.now-playing .thumb-now-playing,
        .hist-item.now-playing .thumb-now-playing { display: flex; }
        .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 22px; }
        .eq-bars span {
            display: block; width: 3px; border-radius: 2px; background: white;
            animation: eq-anim 0.8s ease-in-out infinite alternate;
        }
        .eq-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bars span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
        .eq-bars span:nth-child(3) { height: 9px; animation-delay: 0.3s; }
        .eq-bars span:nth-child(4) { height: 18px; animation-delay: 0.1s; }
        @keyframes eq-anim { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
        .fav-info, .hist-info { flex: 1; overflow: hidden; text-align: right; direction: rtl; }
        .fav-title, .hist-title {
            font-size: 13px; font-weight: 600; color: var(--text-main);
            line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .fav-item.now-playing .fav-title,
        .hist-item.now-playing .hist-title { color: var(--primary); }
        .fav-scholar, .hist-scholar { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
        .hist-date { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
        .now-playing-label {
            font-size: 10px; color: var(--primary); font-weight: bold;
            display: flex; align-items: center; gap: 3px; margin-top: 4px; direction: ltr;
        }
        .now-playing-label i { font-size: 9px; animation: pulse-icon 1s infinite; }
        @keyframes pulse-icon { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .fav-play-btn, .hist-play-btn {
            background: var(--primary); color: white; border: none;
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s;
        }
        .fav-item.now-playing .fav-play-btn,
        .hist-item.now-playing .hist-play-btn { background: var(--accent); }
        .fav-play-btn:hover, .hist-play-btn:hover { background: var(--primary-dark); }

        /* CONTACT */
        .contact-about-box { background: white; border-radius: var(--radius-md); padding: 18px; margin-bottom: 16px; box-shadow: var(--shadow-sm); border: 1.5px solid var(--border); text-align: right; direction: rtl; }
        .contact-about-box h3 { color: var(--primary); font-size: 16px; margin-bottom: 10px; }
        .contact-about-box p { color: var(--text-main); font-size: 14px; line-height: 1.7; }
        .contact-notice { background: linear-gradient(135deg, #fff9e6, #fff3cc); border: 1.5px solid #f0c040; border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 16px; text-align: right; direction: rtl; font-size: 13px; color: #7a5c00; }
        .contact-notice i { margin-left: 6px; }
        .contact-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .contact-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 10px; border-radius: var(--radius-md); border: none; color: white; font-weight: bold; font-size: 13px; cursor: pointer; text-decoration: none; transition: opacity 0.2s, transform 0.2s; }
        .contact-btn:hover { opacity: 0.88; transform: scale(1.02); }
        .contact-btn.whatsapp { background: #25d366; }
        .contact-btn.call { background: #2196F3; }
        .contact-btn.email { background: #e74c3c; }
        .contact-btn.telegram { background: #0088cc; }
        .contact-btn.website { background: var(--primary); grid-column: 1 / -1; }

        /* AD SLOTS */
        .ad-slot {
            width: 100%; background: #f0f4f8; border: 1.5px dashed #c8d6e5;
            border-radius: var(--radius-md); margin-bottom: 18px; overflow: hidden;
            display: flex; align-items: center; justify-content: center; min-height: 60px;
        }
        .ad-slot iframe, .ad-slot ins, .ad-slot > * { display: block; width: 100%; }
        .ad-slot-inline { min-height: 60px; margin: 0 0 16px 0; }

        .hidden { display: none !important; }
        audio { width: 100%; max-width: 600px; outline: none; }
    </style>
</head>
<body>

<header>
    <button class="request-btn" onclick="toggleModal(true)"><i class="fa-solid fa-paper-plane"></i> Bayan Request</button>
    <h1>ULAMA_E_DEOBAND</h1>
    <h5>Old Bayanat Akabreen Ulama E Deoband</h5>
</header>

<div id="tab-loader-overlay">
    <div class="spinner"></div>
    <div class="loader-text">Please Wait...</div>
</div>

<div class="container">
    <!-- HOME TAB -->
    <div id="tab-home" class="tab-content active">
        <div id="loading-view" class="loader-container">
            <div class="spinner"></div>
            <div class="loader-text">Please Wait...</div>
        </div>
        <div id="home-view" class="hidden">
            <div class="ad-slot" id="ad-home-top"><!-- AD CODE HERE --></div>
            
            <div class="grid" id="folder-container"></div>
            <div class="ad-slot" id="ad-home-bottom" style="margin-top:18px;"><!-- AD CODE HERE --></div>
        </div>
        <div id="player-view" class="hidden">

<script>
/* ===== FIREBASE ===== */
const firebaseConfig = {
    apiKey: "AIzaSyAEItN0OBCInSwzRDeKzWyAqg08mtciQMA",
    authDomain: "bayan-app-7e2fe.firebaseapp.com",
    databaseURL: "https://bayan-app-7e2fe-default-rtdb.firebaseio.com",
    projectId: "bayan-app-7e2fe",
    storageBucket: "bayan-app-7e2fe.firebasestorage.app",
    messagingSenderId: "702165343503",
    appId: "1:702165343503:web:be2792a91310f9f4c3727a"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

/* ===== STATE ===== */
let localScholarsData = {};
let currentTrackUrl = "";
let currentTrackId = "";
let currentScholarId = "";
let currentTrackData = null;
let currentTab = 'home';
let contactLoaded = false;
let downloadClickCount = 0;

/* ===== SINGLE GLOBAL AUDIO ===== */
const globalAudio = new Audio();
globalAudio.preload = "auto";

globalAudio.addEventListener('timeupdate', () => {
    if (!currentTrackUrl) return;
    try {
        const key = 'resume_' + btoa(unescape(encodeURIComponent(currentTrackUrl)));
        localStorage.setItem(key, globalAudio.currentTime);
    } catch(e) {}
    if (globalAudio.duration) {
        const pct = (globalAudio.currentTime / globalAudio.duration) * 100;
        document.getElementById('fp-progress').value = pct;
        document.getElementById('fp-current').textContent = formatTime(globalAudio.currentTime);
        document.getElementById('fp-duration').textContent = formatTime(globalAudio.duration);
    }
});

globalAudio.addEventListener('ended', () => {
    try { localStorage.removeItem('resume_' + btoa(unescape(encodeURIComponent(currentTrackUrl)))); } catch(e) {}
    document.querySelectorAll('.track-item').forEach(i => i.classList.remove('active-track'));
    setPlayingUI(false);
    updateListNowPlaying('');
});

globalAudio.addEventListener('error', () => {
    setBuffering(false);
    document.getElementById('mini-play-btn').innerHTML = '<i class="fa fa-exclamation-triangle"></i>';
    document.getElementById('fp-play-btn').innerHTML = '<i class="fa fa-exclamation-triangle"></i>';
});

/* FIX 2: buffering events */
globalAudio.addEventListener('waiting', () => { setBuffering(true); });
globalAudio.addEventListener('playing', () => { setBuffering(false); });
globalAudio.addEventListener('canplay', () => { setBuffering(false); });

function setBuffering(isBuffering) {
    const miniPlayer = document.getElementById('mini-player');
    if (isBuffering) {
        miniPlayer.classList.add('buffering');
    } else {
        miniPlayer.classList.remove('buffering');
    }
}

/* ===== PLAY/PAUSE UI HELPERS ===== */
function setPlayingUI(isPlaying) {
    const miniPlayer = document.getElementById('mini-player');
    if (isPlaying) {
        miniPlayer.classList.remove('paused');
        document.getElementById('mini-play-btn').innerHTML = '<i class="fa fa-pause"></i>';
        document.getElementById('fp-play-btn').innerHTML = '<i class="fa fa-pause"></i>';
    } else {
        miniPlayer.classList.add('paused');
        document.getElementById('mini-play-btn').innerHTML = '<i class="fa fa-play"></i>';
        document.getElementById('fp-play-btn').innerHTML = '<i class="fa fa-play"></i>';
    }
    document.querySelectorAll('.eq-bars').forEach(el => {
        el.querySelectorAll('span').forEach(s => {
            s.style.animationPlayState = isPlaying ? 'running' : 'paused';
        });
    });
}

function updateListNowPlaying(trackId) {
    document.querySelectorAll('.fav-item').forEach(item => {
        const tid = item.dataset.trackid;
        item.classList.toggle('now-playing', tid === trackId && tid !== '');
        const btn = item.querySelector('.fav-play-btn i');
        if (btn) btn.className = (tid === trackId && tid !== '') ? 'fa fa-volume-up' : 'fa fa-play';
    });
    document.querySelectorAll('.hist-item').forEach(item => {
        const tid = item.dataset.trackid;
        item.classList.toggle('now-playing', tid === trackId && tid !== '');
        const btn = item.querySelector('.hist-play-btn i');
        if (btn) btn.className = (tid === trackId && tid !== '') ? 'fa fa-volume-up' : 'fa fa-play';
    });
}

/* ===== TAB LOADER ===== */
function showTabLoader(callback, delay) {
    const overlay = document.getElementById('tab-loader-overlay');
    overlay.classList.add('show');
    setTimeout(() => { overlay.classList.remove('show'); if (callback) callback(); }, delay || 900);
}

/* ===== TAB NAVIGATION ===== */
function switchTab(tabName, el) {
    showTabLoader(() => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        el.classList.add('active');
        currentTab = tabName;
        if (tabName === 'home') {
            document.getElementById('player-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('loading-view').style.display = 'none';
            displayScholars(localScholarsData);
            window.history.pushState({ page: 'home' }, '');
        }
        if (tabName === 'favorites') renderFavorites();
        if (tabName === 'history') renderHistory();
        if (tabName === 'contact') loadContact();
    }, 900);
}

/* ===== BACK BUTTON ===== */
window.addEventListener('popstate', (e) => {
    if (document.getElementById('full-player-modal').classList.contains('open')) {
        closeFullPlayer();
        window.history.pushState({ page: currentTab }, '');
        return;
    }
    if (!document.getElementById('player-view').classList.contains('hidden')) {
        goHome();
        window.history.pushState({ page: 'home' }, '');
        return;
    }
    if (currentTab !== 'home') {
        const homeBtn = document.querySelector('.nav-tab[data-tab="home"]');
        showTabLoader(() => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-home').classList.add('active');
            homeBtn.classList.add('active');
            currentTab = 'home';
            document.getElementById('player-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('loading-view').style.display = 'none';
            displayScholars(localScholarsData);
        }, 900);
        window.history.pushState({ page: 'home' }, '');
        return;
    }
    window.history.pushState({ page: 'home' }, '');
});

/* ===== DATA ===== */
function loadData() {
    database.ref('scholars').on('value', (snapshot) => {
        localScholarsData = snapshot.val() || {};
        displayScholars(localScholarsData);
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('home-view').classList.remove('hidden');
        tryResumePlayback();
        window.history.replaceState({ page: 'home' }, '');
    });
}

function getSortedKeys(data) {
    return Object.keys(data).sort((a, b) => {
        const posA = (data[a].position !== null && data[a].position !== undefined) ? data[a].position : 9999;
        const posB = (data[b].position !== null && data[b].position !== undefined) ? data[b].position : 9999;
        return posA - posB;
    });
}

function displayScholars(data) {
    const container = document.getElementById('folder-container');
    container.innerHTML = "";
    const keys = Object.keys(data);
    if (!keys.length) {
        container.innerHTML = "<p style='text-align:center;grid-column:span 2;color:gray;margin-top:40px;'>کوئی ریکارڈ نہیں ملا۔</p>";
        return;
    }
    const sortedKeys = getSortedKeys(data);
    sortedKeys.forEach((id, idx) => {
        const s = data[id];
        const total = s.tracks ? Object.keys(s.tracks).length : 0;
        container.innerHTML += `
            <div class="card" onclick="openScholar('${id}')">
                <span class="bayan-count-badge">${total} بیان</span>
                <img src="${s.img||'https://via.placeholder.com/300x155'}" alt="${escapeHtml(s.name)}" loading="lazy">
                <h3>${escapeHtml(s.name)}</h3>
            </div>`;
        if ((idx+1) % 4 === 0) {
            container.innerHTML += `<div class="ad-slot ad-slot-inline" style="grid-column:span 2;"><!-- AD CODE HERE --></div>`;
        }
    });
}

/* ===== SCHOLAR DETAIL ===== */
function openScholar(id) {
    const scholar = localScholarsData[id];
    if (!scholar) return;
    currentScholarId = id;
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('loading-view').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('player-view').classList.remove('hidden');
        document.getElementById('scholar-name').innerText = scholar.name;
        document.getElementById('scholar-img').src = scholar.img || 'https://via.placeholder.com/150';
        buildTrackList(scholar);
        window.history.pushState({ page: 'player' }, '');
    }, 800);
}

function buildTrackList(scholar) {
    if (!scholar.tracks) {
        document.getElementById('track-list').innerHTML = "<p style='text-align:center;color:var(--text-muted);font-weight:bold;margin-top:30px;'>کوئی بیان موجود نہیں ہے۔</p>";
        return;
    }
    const tracksArray = Object.keys(scholar.tracks).reverse().map(trackId => ({ trackId, t: scholar.tracks[trackId] }));
    renderTrackList(tracksArray, scholar);
}

function renderTrackList(items, scholar) {
    const list = document.getElementById('track-list');
    list.innerHTML = "";
    const s = scholar || localScholarsData[currentScholarId];
    if (!s) return;
    items.forEach(({ trackId, t }, index) => {
        const dur = t.duration ? `⏱️ ${t.duration}` : '';
        const isActive = (currentTrackUrl === t.file) ? 'active-track' : '';
        const isFav = isFavorite(trackId);
        list.innerHTML += `
            <div class="track-item ${isActive}" data-file="${t.file}" data-trackid="${trackId}"
                onclick="playAudio('${escapeAttr(t.file)}', this, '${trackId}', '${escapeAttr(t.title)}', '${escapeAttr(t.thumb||'')}', '${escapeAttr(s.name)}')">
                <div class="thumb-container">
                    <span class="track-number-badge">${index+1}</span>
                    <img src="${t.thumb||'https://via.placeholder.com/640x320'}" alt="" loading="lazy">
                    <div class="now-playing-overlay">▶ Now Playing</div>
                </div>
                <div class="track-details">
                    <p class="track-title">${escapeHtml(t.title)}</p>
                    <div class="track-meta">
                        <div class="track-actions" onclick="event.stopPropagation()">
                            <button class="track-action-btn fav-btn ${isFav?'favorited':''}"
                                onclick="toggleFavorite('${trackId}','${escapeAttr(t.title)}','${escapeAttr(t.thumb||'')}','${escapeAttr(t.file)}','${escapeAttr(s.name)}',this)">
                                <i class="${isFav?'fa-solid':'fa-regular'} fa-heart"></i>
                            </button>
                            <button class="track-action-btn" onclick="shareBayan('${escapeAttr(t.title)}','${escapeAttr(t.file)}')">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                            <button class="track-action-btn" onclick="maybeAdThenDownload('${escapeAttr(t.file)}','${escapeAttr(t.title)}')">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                        <p class="track-duration">${dur}</p>
                    </div>
                </div>
            </div>`;
        if ((index+1) % 5 === 0) {
            list.innerHTML += `<div class="ad-slot ad-slot-inline" id="ad-track-${index}"><!-- AD CODE HERE --></div>`;
        }
    });
}

/* ===== AUDIO PLAYER ===== */
function playAudio(file, element, trackId, title, thumb, scholarName) {
    globalAudio.pause();
    globalAudio.src = '';

    currentTrackUrl = file;
    currentTrackId = trackId;

    document.getElementById('mini-thumb').src = thumb || 'https://via.placeholder.com/44';
    document.getElementById('mini-title').textContent = title;
    document.getElementById('mini-scholar').textContent = scholarName;
    document.getElementById('fp-thumb').src = thumb || 'https://via.placeholder.com/640x320';
    document.getElementById('fp-title').textContent = title;
    document.getElementById('fp-scholar').textContent = scholarName;

    document.querySelectorAll('.track-item').forEach(i => i.classList.remove('active-track'));
    if (element) element.classList.add('active-track');

    document.getElementById('mini-player').classList.add('visible');
    setPlayingUI(true);
    setBuffering(true); /* FIX 2: show spinner immediately on new track */
    updateListNowPlaying(trackId);

    globalAudio.src = file;
    globalAudio.load();

    let resumed = false;
    try {
        const saved = localStorage.getItem('resume_' + btoa(unescape(encodeURIComponent(file))));
        if (saved && parseFloat(saved) > 2) {
            globalAudio.addEventListener('loadedmetadata', () => {
                globalAudio.currentTime = parseFloat(saved);
                globalAudio.play().catch(() => {});
            }, { once: true });
            resumed = true;
        }
    } catch(e) {}

    if (!resumed) {
        globalAudio.play().catch(() => {
            globalAudio.addEventListener('canplay', () => {
                globalAudio.play().catch(() => {});
            }, { once: true });
        });
    }

    saveHistory({ file, title, thumb, scholarName, trackId });
    currentTrackData = { file, title, thumb, scholarName, trackId };
    try {
        localStorage.setItem('last_resume', JSON.stringify({ file, currentTime: 0, scholarId: currentScholarId, trackId, title, thumb, scholarName }));
    } catch(e) {}
}

function toggleMiniPlay(event) {
    if (event) event.stopPropagation();
    if (!globalAudio.src) return;

    /* FIX 1: if audio has no src loaded yet (resume state), load and play */
    if (globalAudio.src && globalAudio.readyState === 0 && currentTrackUrl) {
        setBuffering(true);
        setPlayingUI(true);
        globalAudio.src = currentTrackUrl;
        globalAudio.load();
        try {
            const saved = localStorage.getItem('resume_' + btoa(unescape(encodeURIComponent(currentTrackUrl))));
            if (saved && parseFloat(saved) > 2) {
                globalAudio.addEventListener('loadedmetadata', () => {
                    globalAudio.currentTime = parseFloat(saved);
                    globalAudio.play().catch(() => {});
                }, { once: true });
                return;
            }
        } catch(e) {}
        globalAudio.play().catch(() => {
            globalAudio.addEventListener('canplay', () => { globalAudio.play().catch(() => {}); }, { once: true });
        });
        return;
    }

    if (globalAudio.paused) {
        globalAudio.play().catch(() => {});
        setPlayingUI(true);
        updateListNowPlaying(currentTrackId);
    } else {
        globalAudio.pause();
        setPlayingUI(false);
    }
}

function seekAudio(value) {
    if (!globalAudio.duration) return;
    globalAudio.currentTime = (value / 100) * globalAudio.duration;
}

function skipAudio(seconds) {
    if (!globalAudio.src) return;
    globalAudio.currentTime = Math.max(0, Math.min(globalAudio.duration || 0, globalAudio.currentTime + seconds));
}

function setSpeed(speed, btn) {
    globalAudio.playbackRate = speed;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function formatTime(secs) {
    if (!secs || isNaN(secs)) return '0:00';
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

/* ===== FULL PLAYER ===== */
function openFullPlayer(event) {
    if (event) event.stopPropagation();
    document.getElementById('full-player-modal').classList.add('open');
    window.history.pushState({ page: 'fullplayer' }, '');
}
function closeFullPlayer() {
    document.getElementById('full-player-modal').classList.remove('open');
}
document.getElementById('full-player-modal').addEventListener('click', function(e) {
    if (e.target === this) closeFullPlayer();
});

/* ===== RESUME (FIX 1: restore src so mini player click works) ===== */
function tryResumePlayback() {
    try {
        const data = JSON.parse(localStorage.getItem('last_resume') || 'null');
        if (!data || !data.file) return;
        document.getElementById('mini-thumb').src = data.thumb || 'https://via.placeholder.com/44';
        document.getElementById('mini-title').textContent = data.title || '—';
        document.getElementById('mini-scholar').textContent = data.scholarName || '—';
        document.getElementById('fp-thumb').src = data.thumb || '';
        document.getElementById('fp-title').textContent = data.title || '';
        document.getElementById('fp-scholar').textContent = data.scholarName || '';
        currentTrackUrl = data.file;
        currentTrackId = data.trackId || '';
        currentScholarId = data.scholarId || '';
        currentTrackData = data;
        /* FIX 1: set audio src so readyState > 0 is not needed; keep paused */
        globalAudio.src = data.file;
        try {
            const saved = localStorage.getItem('resume_' + btoa(unescape(encodeURIComponent(data.file))));
            if (saved && parseFloat(saved) > 2) {
                globalAudio.addEventListener('loadedmetadata', () => {
                    globalAudio.currentTime = parseFloat(saved);
                }, { once: true });
            }
        } catch(e) {}
        document.getElementById('mini-player').classList.add('visible');
        setPlayingUI(false);
    } catch(e) {}
}

/* ===== NAVIGATION ===== */
function goHome() {
    document.getElementById('player-view').classList.add('hidden');
    document.getElementById('loading-view').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('home-view').classList.remove('hidden');
        displayScholars(localScholarsData);
    }, 600);
}
function goHomeExplicit() { window.history.back(); }

/* ===== FAVORITES ===== */
function getFavorites() { try { return JSON.parse(localStorage.getItem('ud_favorites')||'[]'); } catch(e) { return []; } }
function saveFavorites(f) { localStorage.setItem('ud_favorites', JSON.stringify(f)); }
function isFavorite(id) { return getFavorites().some(f => f.trackId === id); }

function toggleFavorite(trackId, title, thumb, file, scholarName, btn) {
    let favs = getFavorites();
    const idx = favs.findIndex(f => f.trackId === trackId);
    if (idx > -1) {
        favs.splice(idx, 1);
        btn.classList.remove('favorited');
        btn.innerHTML = '<i class="fa-regular fa-heart"></i>';
    } else {
        favs.push({ trackId, title, thumb, file, scholarName, addedAt: Date.now() });
        btn.classList.add('favorited');
        btn.innerHTML = '<i class="fa-solid fa-heart"></i>';
    }
    saveFavorites(favs);
}

function renderFavorites() {
    const favs = getFavorites();
    const el = document.getElementById('fav-list');
    if (!favs.length) {
        el.innerHTML = `<div class="fav-empty"><i class="fa-regular fa-heart"></i><p>ابھی کوئی پسندیدہ بیان نہیں ہے۔<br>بیانات پر دل کا نشان دبائیں۔</p></div>`;
        return;
    }
    el.innerHTML = '';
    favs.forEach(f => {
        const isNP = (f.trackId === currentTrackId && currentTrackId !== '');
        el.innerHTML += `
            <div class="fav-item ${isNP?'now-playing':''}" data-trackid="${f.trackId}"
                onclick="playFromList('${escapeAttr(f.file)}','${escapeAttr(f.title)}','${escapeAttr(f.thumb)}','${escapeAttr(f.scholarName)}','${f.trackId}')">
                <div class="fav-thumb-wrap">
                    <img class="fav-thumb" src="${f.thumb||'https://via.placeholder.com/56'}" alt="" loading="lazy">
                    <div class="thumb-now-playing">
                        <div class="eq-bars"><span></span><span></span><span></span><span></span></div>
                    </div>
                </div>
                <div class="fav-info">
                    <div class="fav-title">${escapeHtml(f.title)}</div>
                    <div class="fav-scholar">${escapeHtml(f.scholarName)}</div>
                    ${isNP ? '<div class="now-playing-label"><i class="fa fa-circle"></i> Now Playing</div>' : ''}
                </div>
                <button class="fav-play-btn" onclick="playFromList('${escapeAttr(f.file)}','${escapeAttr(f.title)}','${escapeAttr(f.thumb)}','${escapeAttr(f.scholarName)}','${f.trackId}'); event.stopPropagation();">
                    <i class="${isNP?'fa fa-volume-up':'fa fa-play'}"></i>
                </button>
            </div>`;
    });
    if (globalAudio.paused) {
        document.querySelectorAll('.eq-bars span').forEach(s => s.style.animationPlayState = 'paused');
    }
}

/* ===== HISTORY ===== */
function getHistory() { try { return JSON.parse(localStorage.getItem('ud_history')||'[]'); } catch(e) { return []; } }
function saveHistory(track) {
    let h = getHistory().filter(x => x.file !== track.file);
    h.unshift({ ...track, playedAt: Date.now() });
    localStorage.setItem('ud_history', JSON.stringify(h.slice(0,10)));
}

function renderHistory() {
    const hist = getHistory();
    const el = document.getElementById('hist-list');
    if (!hist.length) {
        el.innerHTML = `<div class="history-empty"><i class="fa fa-history"></i><p>ابھی کوئی سننے کی تاریخ نہیں ہے۔<br>بیانات سنیں اور یہاں محفوظ ہوں گے۔</p></div>`;
        return;
    }
    el.innerHTML = '';
    hist.forEach(h => {
        const date = new Date(h.playedAt).toLocaleDateString('ur-PK', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
        const isNP = (h.trackId === currentTrackId && currentTrackId !== '');
        el.innerHTML += `
            <div class="hist-item ${isNP?'now-playing':''}" data-trackid="${h.trackId}"
                onclick="playFromList('${escapeAttr(h.file)}','${escapeAttr(h.title)}','${escapeAttr(h.thumb)}','${escapeAttr(h.scholarName)}','${h.trackId}')">
                <div class="hist-thumb-wrap">
                    <img class="hist-thumb" src="${h.thumb||'https://via.placeholder.com/56'}" alt="" loading="lazy">
                    <div class="thumb-now-playing">
                        <div class="eq-bars"><span></span><span></span><span></span><span></span></div>
                    </div>
                </div>
                <div class="hist-info">
                    <div class="hist-title">${escapeHtml(h.title)}</div>
                    <div class="hist-scholar">${escapeHtml(h.scholarName)}</div>
                    <div class="hist-date"><i class="fa fa-clock"></i> ${date}</div>
                    ${isNP ? '<div class="now-playing-label"><i class="fa fa-circle"></i> Now Playing</div>' : ''}
                </div>
                <button class="hist-play-btn" onclick="playFromList('${escapeAttr(h.file)}','${escapeAttr(h.title)}','${escapeAttr(h.thumb)}','${escapeAttr(h.scholarName)}','${h.trackId}'); event.stopPropagation();">
                    <i class="${isNP?'fa fa-volume-up':'fa fa-play'}"></i>
                </button>
            </div>`;
    });
    if (globalAudio.paused) {
        document.querySelectorAll('.eq-bars span').forEach(s => s.style.animationPlayState = 'paused');
    }
}

function playFromList(file, title, thumb, scholarName, trackId) {
    playAudio(file, null, trackId, title, thumb, scholarName);
    if (currentTab === 'favorites') setTimeout(renderFavorites, 100);
    if (currentTab === 'history') setTimeout(renderHistory, 100);
}

/* ===== CONTACT ===== */
function loadContact() {
    if (contactLoaded) return;
    database.ref('settings').once('value', (snap) => {
        contactLoaded = true;
        document.getElementById('contact-loading').style.display = 'none';
        const el = document.getElementById('contact-content');
        el.classList.remove('hidden');
        const d = snap.val() || {};
        let html = '';
        if (d.notice) html += `<div class="contact-notice"><i class="fa fa-bell"></i>${escapeHtml(d.notice)}</div>`;
        if (d.about) html += `<div class="contact-about-box"><h3>ہمارے بارے میں</h3><p>${escapeHtml(d.about)}</p></div>`;
        html += '<div class="contact-buttons">';
        if (d.whatsapp) html += `<a class="contact-btn whatsapp" href="https://wa.me/${d.whatsapp.replace(/\D/g,'')}" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>`;
        if (d.phone) html += `<a class="contact-btn call" href="tel:${d.phone}"><i class="fa fa-phone"></i> Call</a>`;
        if (d.email) html += `<a class="contact-btn email" href="mailto:${d.email}"><i class="fa fa-envelope"></i> Email</a>`;
        if (d.telegram) html += `<a class="contact-btn telegram" href="https://t.me/${d.telegram.replace('@','')}" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram</a>`;
        if (d.website) html += `<a class="contact-btn website" href="${d.website}" target="_blank"><i class="fa fa-globe"></i> Website</a>`;
        html += '</div>';
        if (!d.whatsapp && !d.phone && !d.email && !d.telegram && !d.website && !d.about) {
            html = `<div class="fav-empty"><i class="fa fa-address-book"></i><p>رابطہ کی معلومات ابھی دستیاب نہیں ہیں۔</p></div>`;
        }
        el.innerHTML = html;
    }, () => {
        document.getElementById('contact-loading').style.display = 'none';
        document.getElementById('contact-content').classList.remove('hidden');
        document.getElementById('contact-content').innerHTML = `<div class="fav-empty"><i class="fa fa-exclamation-triangle"></i><p>معلومات لوڈ کرنے میں خرابی آئی۔</p></div>`;
    });
}

/* ===== SHARE & DOWNLOAD ===== */
function shareBayan(title, file) {
    if (navigator.share) { navigator.share({ title, text: title, url: file }).catch(() => {}); }
    else { copyToClipboard(file); alert('لنک کاپی ہو گیا!'); }
}
function maybeAdThenDownload(file, title) {
    downloadClickCount++;
    if (downloadClickCount % 3 === 0) {
        const adUrl = 'YOUR_AD_DIRECT_LINK_HERE';
        if (adUrl && adUrl !== 'YOUR_AD_DIRECT_LINK_HERE') window.open(adUrl, '_blank');
        setTimeout(() => downloadBayan(file, title), 400);
    } else { downloadBayan(file, title); }
}
function downloadBayan(file, title) {
    const a = document.createElement('a');
    a.href = file; a.download = (title||'bayan')+'.mp3'; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function copyToClipboard(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
}

/* ===== REQUEST MODAL ===== */
function toggleModal(show) {
    document.getElementById('requestModal').classList.toggle('open', show);
    if (!show) document.getElementById('req-message').value = '';
}
function submitRequest() {
    const msg = document.getElementById('req-message').value.trim();
    if (!msg) { alert('براہ کرم بیان کی تفصیلات لکھیں!'); return; }
    database.ref('messages').push({
        message: `📢 New Bayan Request\n📝 Details: ${msg}`,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    }).then(() => { alert('آپ کی درخواست کامیابی سے بھیج دی گئی ہے!'); toggleModal(false); })
    .catch(() => alert('درخواست بھیجنے میں خرابی آئی۔ دوبارہ کوشش کریں۔'));
}

/* ===== UTILS ===== */
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
    if (!str) return '';
    return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
}

/* ===== INIT ===== */
loadData();
